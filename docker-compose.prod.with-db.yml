services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.production
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

